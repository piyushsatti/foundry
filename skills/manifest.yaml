# Foundry skill registry — source of truth for install allowlist + dependencies.
#
# Fields per skill:
#   path        — repo-relative directory
#   mcp_bundle  — optional; rsync mcps/<name>/ server+web+scripts+examples into install dir
#   origin      — authored | vendor
#   bundle      — vendor bundle name (vendor only)
#   status      — shipped | draft (authored only)
#   requires    — hard deps; must exist in this manifest (fail validate if missing)
#   suggests    — soft handoff / next-step after this skill completes
#   dispatches  — may invoke via Skill tool or subagent (must exist in manifest)
#   external    — outside foundry bundle (plugins); documented, not validated
#
version: 1

skills:
  # --- Authored ---

  manifold:
    path: bundles/manifold/skills/manifold
    origin: authored
    status: shipped
    requires: []
    suggests: [red-vs-blue, present]
    dispatches: []
    external: []

